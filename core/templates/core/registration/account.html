{% load crispy_forms_tags %}
<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi cuenta</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

    <style>
        .bg-custom {
            background-color: #f7fbff;
        }

        .asteriskField {
            display: none;
        }

        .custom-input[readonly] {
            background-color: #f8f9fa;
            border-right: none;
        }

        .edit-btn {
            border-left: 1px solid #dee2e6;
            background-color: #fff;
            display: flex;
            align-items: center;
            transition: all 0.2s ease;
        }

        .edit-btn:hover {
            background-color: #1d293d !important;
            color: white !important;
        }

        .custom-input:focus {
            box-shadow: none;
            border-color: #1d293d;
        }

        .avatar-wrapper {
            position: relative;
        }

        .avatar-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 50%;
            border: 3px solid #fff;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
        }

        .avatar-edit-btn {
            position: absolute;
            bottom: 5px;
            right: 5px;
            background-color: #1d293d;
            color: white;
            border: 2px solid white;
            width: 34px;
            height: 34px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: transform 0.2s, background-color 0.2s;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.2);
        }

        .avatar-edit-btn:hover {
            background-color: #2a3b55;
            transform: scale(1.1);
        }

        .nav-user-link img {
            object-fit: cover;
            display: block;
        }

        .nav-user-link:hover {
            background-color: rgba(29, 41, 61, 0.05);
            color: #1d293d;
        }

        .nav-user-link img {
            object-fit: cover;
            display: block;
        }

        .nav-user-link:hover {
            background-color: rgba(29, 41, 61, 0.05);
            color: #1d293d;
        }
    </style>
</head>

<body class="d-flex flex-column min-vh-100">
    {% include 'core/components/navbar.html' %}

    <main class="container flex-grow-1 d-flex align-items-center justify-content-center">

        <div class="d-flex justify-content-center mb-4 text-center">
            <div class="avatar-wrapper">
                <img src="https://ui-avatars.com/api/?name={{ user.first_name }}+{{ user.last_name }}&background=1d293d&color=fff&size=256"
                    alt="Avatar" class="avatar-img">

                <button type="button" class="avatar-edit-btn" title="Cambiar imagen">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M17 3a2.828 2.828 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5L17 3z"></path>
                    </svg>
                </button>

                <h3>{{ user.first_name }} {{ user.last_name }}</h3>
            </div>
        </div>


        <div class="container mt-4">
            <div class="row justify-content-center">
                <div class="col-md-6">
                    <form method="POST">
                        {% csrf_token %}
                        <div class="mb-4">
                            <label class="form-label fw-semibold">Nombre</label>
                            <div class="input-group">
                                <input type="text" class="form-control custom-input" name="first_name"
                                    value="{{ user.first_name }}" readonly>


                                <button class="btn btn-outline-dark edit-btn" type="button" onclick="enableField(this)">
                                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24"
                                        fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                                        stroke-linejoin="round">
                                        <path d="M17 3a2.828 2.828 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5L17 3z"></path>
                                    </svg>
                                </button>
                            </div>
                        </div>

                        <div class="mb-4">
                            <label class="form-label fw-semibold">Apellido</label>
                            <div class="input-group">
                                <input type="text" class="form-control custom-input" name="last_name"
                                    value="{{ user.last_name }}" readonly>


                                <button class="btn btn-outline-dark edit-btn" type="button" onclick="enableField(this)">
                                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24"
                                        fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                                        stroke-linejoin="round">
                                        <path d="M17 3a2.828 2.828 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5L17 3z"></path>
                                    </svg>
                                </button>
                            </div>
                        </div>

                        <div class="mb-4">
                            <label class="form-label fw-semibold">Email</label>
                            <div class="input-group">
                                <input type="email" class="form-control custom-input" name="email"
                                    value="{{ user.email }}" readonly>


                                <button class="btn btn-outline-dark edit-btn" type="button" onclick="enableField(this)">
                                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24"
                                        fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                                        stroke-linejoin="round">
                                        <path d="M17 3a2.828 2.828 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5L17 3z"></path>
                                    </svg>
                                </button>
                            </div>
                        </div>

                        <button type="submit" class="btn btn-success w-100">Guardar Cambios</button>
                    </form>
                </div>
            </div>
        </div>

    </main>

    <footer class="bg-dark text-white py-4">
        <div class="container text-center">
            <div class="d-flex justify-content-center align-items-center mb-3">
                <svg xmlns="http://www.w3.org/2000/svg" width="50" height="44" viewBox="0 0 24 24" fill="none"
                    stroke="#ffffff" stroke-width="1" stroke-linecap="round" stroke-linejoin="round"
                    class="lucide lucide-graduation-cap" x="56" y="56">
                    <path
                        d="M21.42 10.922a1 1 0 0 0-.019-1.838L12.83 5.18a2 2 0 0 0-1.66 0L2.6 9.08a1 1 0 0 0 0 1.832l8.57 3.908a2 2 0 0 0 1.66 0z">
                    </path>
                    <path d="M22 10v6"></path>
                    <path d="M6 12.5V16a6 3 0 0 0 12 0v-3.5"></path>
                </svg>
                <span class="fw-bold text-truncate">Mini LMS</span>
            </div>

            <div>
                <p class="mb-0 small text-white-50">
                    Plataforma educativa diseñada para facilitar el aprendizaje
                </p>
            </div>

        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>

    <script>
        function enableField(btn) {
            const input = btn.closest('.input-group').querySelector('input');
            const saveContainer = document.getElementById('saveContainer');

            if (input) {
                input.removeAttribute('readonly');
                input.focus();

                input.style.backgroundColor = "#ffffff";
                btn.classList.replace('btn-outline-dark', 'btn-dark');

                if (saveContainer) {
                    saveContainer.classList.remove('d-none');
                }
            } else {
                console.error("No se encontró el input relacionado al botón.");
            }
        }
    </script>
</body>

</html>
