<!doctype html>
<html lang="es">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Chat</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <style>
        .btn-login {
            --bs-btn-bg: #fff;
            --bs-btn-color: #1d293d;
            --bs-btn-border-color: #1d293d;
            --bs-btn-hover-bg: #fff;
            --bs-btn-hover-color: #1d293d;
            --bs-btn-hover-border-color: #1d293d;
        }

        .btn-sing-up {
            --bs-btn-bg: #1d293d;
            --bs-btn-color: #fff;
            --bs-btn-border-color: #1d293d;
            --bs-btn-hover-bg: #1d293d;
            --bs-btn-hover-color: #fff;
            --bs-btn-hover-border-color: #1d293d;
        }

        .card-hover-shadow {
            position: relative;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .card-hover-shadow:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2) !important;
            z-index: 10;
        }

        .nav-user-link img {
            object-fit: cover;
            display: block;
        }

        .nav-user-link:hover {
            background-color: rgba(29, 41, 61, 0.05);
            color: #1d293d;
        }

        canvas {
            background: #fff;
            width: 100%;
            height: 100%;
            display: block;
        }
    </style>
</head>

<body class="d-flex flex-column min-vh-100">
    {% include 'core/components/navbar.html' %}

    <main class="flex-grow-1">
        <canvas id="canvas"></canvas>
    </main>

    <footer class="bg-dark text-white py-4">
        <div class="container text-center">
            <div class="d-flex justify-content-center align-items-center mb-3">
                <svg xmlns="http://www.w3.org/2000/svg" width="50" height="44" viewBox="0 0 24 24" fill="none"
                    stroke="#ffffff" stroke-width="1" stroke-linecap="round" stroke-linejoin="round"
                    class="lucide lucide-graduation-cap" x="56" y="56">
                    <path
                        d="M21.42 10.922a1 1 0 0 0-.019-1.838L12.83 5.18a2 2 0 0 0-1.66 0L2.6 9.08a1 1 0 0 0 0 1.832l8.57 3.908a2 2 0 0 0 1.66 0z">
                    </path>
                    <path d="M22 10v6"></path>
                    <path d="M6 12.5V16a6 3 0 0 0 12 0v-3.5"></path>
                </svg>
                <span class="fw-bold text-truncate">Mini LMS</span>
            </div>


            <div>
                <p class="mb-0 small text-white-50">
                    Plataforma educativa diseñada para facilitar el aprendizaje
                </p>
            </div>

        </div>
    </footer>

    <script>
        const $canvas = document.querySelector("#canvas");
        const ctx = $canvas.getContext("2d");

        $canvas.addEventListener("mousedown", startDrawing);
        $canvas.addEventListener("mousemove", draw);
        $canvas.addEventListener("mouseup", stopDrawing);
        $canvas.addEventListener("mouseleave", stopDrawing);


        const ws = new WebSocket('ws://' + window.location.host + '/ws/board/');

        function sizeOfCanvas() {
            const rect = $canvas.getBoundingClientRect();

            $canvas.width = rect.width;
            $canvas.height = rect.height;
        }

        sizeOfCanvas()

        ws.onmessage = function (event) {
            const data = JSON.parse(event.data);

            if (data.type === "draw") {
                const [x1, y1, x2, y2, color] = [
                    data.x1,
                    data.y1,
                    data.x2,
                    data.y2,
                    data.color
                ];

                drawLine(x1, y1, x2, y2, color);
            }
        };

        ws.onclose = function (e) {
            console.error('Chat socket closed unexptedly');
        }

        let isDrawing = false;
        let startX, startY;
        let lastX = 0;
        let lastY = 0;

        function startDrawing(event) {
            isDrawing = true;

            const { offsetX, offsetY } = event;

            [startX, startY] = [offsetX, offsetY];
            [lastX, lastY] = [offsetX, offsetY];
        }

        function draw(event) {
            if (!isDrawing) return;

            const { offsetX, offsetY } = event;

            drawLine(lastX, lastY, offsetX, offsetY, "#000000");

            sendDrawLine(lastX, lastY, offsetX, offsetY, "#000000");

            [lastX, lastY] = [offsetX, offsetY];
        }

        function stopDrawing(event) {
            isDrawing = false;
        }

        function drawLine(x1, y1, x2, y2, color) {
            ctx.strokeStyle = "#000000";
            ctx.lineWidth = 8;
            ctx.lineCap = "round"

            ctx.beginPath();

            ctx.moveTo(x1, y1);
            ctx.lineTo(x2, y2);

            ctx.stroke();
        }

        function sendDrawLine(x1, y1, x2, y2, color) {
            if (ws && ws.readyState === WebSocket.OPEN) {
                ws.send(JSON.stringify({
                    type: "draw", x1, y1, x2, y2, color
                }));
            }
        }
    </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
</body>

</html>
