{% load static %}
<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Creacion de curso</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <style>
        .btn-login {
            --bs-btn-bg: #fff;
            --bs-btn-color: #1d293d;
            --bs-btn-border-color: #1d293d;
            --bs-btn-hover-bg: #fff;
            --bs-btn-hover-color: #1d293d;
            --bs-btn-hover-border-color: #1d293d;
        }

        .btn-sing-up {
            --bs-btn-bg: #1d293d;
            --bs-btn-color: #fff;
            --bs-btn-border-color: #1d293d;
            --bs-btn-hover-bg: #1d293d;
            --bs-btn-hover-color: #fff;
            --bs-btn-hover-border-color: #1d293d;
        }

        .text-bg-header {
            background-color: azure;
        }

        .asteriskField {
            display: none;
        }

        .nav-user-link img {
            object-fit: cover;
            display: block;
        }

        .nav-user-link:hover {
            background-color: rgba(29, 41, 61, 0.05);
            color: #1d293d;
        }

        #div_id_students .form-check {
            padding: 8px 12px;
            margin-bottom: 5px;
            background: white;
            border: 1px solid #e9ecef;
            border-radius: 4px;
        }

        #div_id_students label {
            width: 100%;
            cursor: pointer;
        }

        #div_id_students input {
            margin-right: 10px;
        }

        .students-scroll-container legend {
            display: none;
        }

        .students-scroll-container fieldset {
            border: none;
            padding: 0;
            margin: 0;
        }

        .students-scroll-container .form-check {
            display: flex;
            align-items: center;
            padding-left: 0;
            margin-bottom: 5px;
        }

        .students-scroll-container .form-check-input {
            margin-top: 0;
            margin-right: 10px;
            flex-shrink: 0;
        }

        .students-scroll-container .form-check-label {
            cursor: pointer;
            font-size: 0.95rem;
            line-height: 1;
            margin-bottom: 0;
        }
    </style>
</head>

<body class="d-flex flex-column min-vh-100">
    {% include 'core/components/navbar.html' %}

    <main class="flex-grow-1">
        <div class="container mt-5">
            <div class="text-center p-3">
                <h4 class="mb-0">Crear Nuevo Curso</h4>
            </div>

            <form method="POST" class="mt-4">
                {% csrf_token %}
                {% load crispy_forms_tags %}

                {{ form.title|as_crispy_field }}
                {{ form.description|as_crispy_field }}

                <div class="mb-3">
                    <label class="fw-bold mb-2">{{ form.students.label }}</label>
                    <div class="border rounded p-3 bg-light students-scroll-container"
                        style="max-height: 250px; overflow-y: auto;">
                        {{ form.students|as_crispy_field }}
                    </div>
                </div>

                <div class="d-flex gap-2 mt-4">
                    <button type="submit" class="btn btn-success w-100">
                        Publicar Curso
                    </button>
                </div>
            </form>
        </div>
    </main>

    {% include 'core/components/footer.html' %}

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
</body>

</html>
