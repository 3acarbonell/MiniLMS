<!doctype html>
<html lang="es">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Chat</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <style>
        .btn-login {
            --bs-btn-bg: #fff;
            --bs-btn-color: #1d293d;
            --bs-btn-border-color: #1d293d;
            --bs-btn-hover-bg: #fff;
            --bs-btn-hover-color: #1d293d;
            --bs-btn-hover-border-color: #1d293d;
        }

        .btn-sing-up {
            --bs-btn-bg: #1d293d;
            --bs-btn-color: #fff;
            --bs-btn-border-color: #1d293d;
            --bs-btn-hover-bg: #1d293d;
            --bs-btn-hover-color: #fff;
            --bs-btn-hover-border-color: #1d293d;
        }

        .card-hover-shadow {
            position: relative;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .card-hover-shadow:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2) !important;
            z-index: 10;
        }

        .nav-user-link img {
            object-fit: cover;
            display: block;
        }

        .nav-user-link:hover {
            background-color: rgba(29, 41, 61, 0.05);
            color: #1d293d;
        }

        main {
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        img {
            max-width: 100%;
        }

        .inbox_people {
            background: #f8f8f8 none repeat scroll 0 0;
            float: left;
            overflow: hidden;
            width: 30%;
            border-right: 1px solid #c4c4c4;
        }

        .inbox_msg {
            border: 1px solid #c4c4c4;
            clear: both;
            overflow: hidden;
        }

        .top_spac {
            margin: 20px 0 0;
        }


        .recent_heading {
            float: left;
            width: 40%;
        }

        .headind_srch {
            padding: 10px 29px 10px 20px;
            overflow: hidden;
            border-bottom: 1px solid #c4c4c4;
        }

        .recent_heading h4 {
            color: #05728f;
            font-size: 21px;
            margin: auto;
        }

        .chat_ib h5 {
            font-size: 15px;
            color: #464646;
            margin: 0 0 8px 0;
        }

        .chat_ib h5 span {
            font-size: 13px;
            float: right;
        }

        .chat_ib p {
            font-size: 14px;
            color: #989898;
            margin: auto
        }

        .chat_img {
            float: left;
            width: 11%;
        }

        .chat_ib {
            float: left;
            padding: 0 0 0 15px;
            width: 88%;
        }

        .chat_people {
            overflow: hidden;
            clear: both;
        }

        .chat_list {
            border-bottom: 1px solid #c4c4c4;
            margin: 0;
            padding: 18px 16px 10px;
        }

        .inbox_chat {
            height: 550px;
            overflow-y: scroll;
        }

        .active_chat {
            background: #ebebeb;
        }

        .incoming_msg_img {
            display: inline-block;
            width: 6%;
        }

        .received_msg {
            display: inline-block;
            padding: 0 0 0 10px;
            vertical-align: top;
            width: 92%;
        }

        .received_withd_msg p {
            background: #ebebeb none repeat scroll 0 0;
            border-radius: 3px;
            color: #646464;
            font-size: 14px;
            margin: 0;
            padding: 5px 10px 5px 12px;
            width: 100%;
        }

        .time_date {
            color: #747474;
            display: block;
            font-size: 12px;
            margin: 8px 0 0;
        }

        .received_withd_msg {
            width: 57%;
        }

        .mesgs {
            float: left;
            padding: 5px 0px 0px 5px;
            width: 70%;
        }

        .sent_msg p {
            background: #05728f none repeat scroll 0 0;
            border-radius: 3px;
            font-size: 14px;
            margin: 0;
            color: #fff;
            padding: 5px 10px 5px 12px;
            width: 100%;
        }

        .outgoing_msg {
            overflow: hidden;
            margin: 26px 0 26px;
        }

        .sent_msg {
            float: right;
            width: 46%;
        }

        .input_msg_write input {
            background: rgba(0, 0, 0, 0) none repeat scroll 0 0;
            border: solid 1px;
            color: #4c4c4c;
            font-size: 15px;
            min-height: 48px;
            width: 100%;
        }

        .type_msg {
            border-top: 1px solid #c4c4c4;
            position: relative;
        }

        .msg_send_btn {
            background: #05728f none repeat scroll 0 0;
            border: medium none;
            border-radius: 50%;
            color: #fff;
            cursor: pointer;
            font-size: 17px;
            height: 33px;
            position: absolute;
            right: 4px;
            top: 11px;
            width: 33px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .messaging {
            padding: 0 0 50px 0;
        }

        .msg_history {
            height: 516px;
            overflow-y: auto;
        }

        .incoming_msg {
            overflow: hidden;
            margin: 15px 0 15px;
        }

        .outgoing_msg {
            overflow: hidden;
            margin: 15px 0 15px;
        }

        .msg_history {
            height: 516px;
            overflow-y: auto;
            padding-bottom: 10px;
        }
    </style>
</head>

<body class="d-flex flex-column min-vh-100">
    {% include 'core/components/navbar.html' %}

    <main class="flex-grow-1">
        <div class="messaging">
            <div class="inbox_msg">
                <div class="inbox_people">
                    <div class="headind_srch">
                        <div class="recent_heading">
                            <h4>Chat</h4>
                        </div>
                    </div>
                    <div class="inbox_chat">
                        <div class="chat_list active_chat">
                            <div class="chat_people">
                                <div class="chat_ib">
                                    <h5>1° Curso<span class="chat_date">Fecha</span></h5>
                                    <p>Ultimo mensaje</p>
                                </div>
                            </div>
                        </div>
                        <div class="chat_list">
                            <div class="chat_people">
                                <div class="chat_ib">
                                    <h5>2° Curso<span class="chat_date">Fecha</span></h5>
                                    <p>Ultimo mensaje</p>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="mesgs">
                    <div class="msg_history"></div>
                    <div class="type_msg">
                        <div class="input_msg_write">
                            <input type="text" class="write_msg" placeholder="Type a message" />
                            <button class="msg_send_btn" type="button">
                                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor"
                                    class="bi bi-send" viewBox="0 0 16 16">
                                    <path
                                        d="M15.854.146a.5.5 0 0 1 .11.54l-5.819 14.547a.75.75 0 0 1-1.329.124l-3.178-4.995L.643 7.184a.75.75 0 0 1 .124-1.33L15.314.037a.5.5 0 0 1 .54.11ZM6.636 10.07l2.761 4.338L14.13 2.576zm6.787-8.201L1.591 6.602l4.339 2.76z" />
                                </svg>
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <footer class="bg-dark text-white py-4">
        <div class="container text-center">
            <div class="d-flex justify-content-center align-items-center mb-3">
                <svg xmlns="http://www.w3.org/2000/svg" width="50" height="44" viewBox="0 0 24 24" fill="none"
                    stroke="#ffffff" stroke-width="1" stroke-linecap="round" stroke-linejoin="round"
                    class="lucide lucide-graduation-cap" x="56" y="56">
                    <path
                        d="M21.42 10.922a1 1 0 0 0-.019-1.838L12.83 5.18a2 2 0 0 0-1.66 0L2.6 9.08a1 1 0 0 0 0 1.832l8.57 3.908a2 2 0 0 0 1.66 0z">
                    </path>
                    <path d="M22 10v6"></path>
                    <path d="M6 12.5V16a6 3 0 0 0 12 0v-3.5"></path>
                </svg>
                <span class="fw-bold text-truncate">Mini LMS</span>
            </div>


            <div>
                <p class="mb-0 small text-white-50">
                    Plataforma educativa diseñada para facilitar el aprendizaje
                </p>
            </div>

        </div>
    </footer>

    <script>
        const currentUser = "{{ user.first_name }} {{ user.last_name }}";
        const chatSocket = new WebSocket('ws://' + window.location.host + '/ws/chat/');

        const messageInput = document.querySelector('.write_msg');
        const sendButton = document.querySelector('.msg_send_btn');

        chatSocket.onmessage = function (e) {
            const data = JSON.parse(e.data);
            const message = data['message'];
            const user = data['user_name'];
            const msgHistory = document.querySelector('.msg_history');
            let newMsg = "";

            if (currentUser === user) {
                newMsg = `
                    <div class="outgoing_msg">
                        <div class="sent_msg">
                            <p>${message}</p>
                            <span class="time_date">${new Date().toLocaleTimeString()}</span>
                        </div>
                    </div>`;

            } else {
                newMsg = `
                    <div class="incoming_msg">
                            <div class="received_msg">
                                <div class="received_withd_msg">
                                    <span style="font-size: 12px; font-weight: bold; color: #05728f; display: block; margin-bottom: 3px;">
                                        ${user}
                                    </span>
                                    <p>${message}</p>
                                    <span class="time_date">${new Date().toLocaleTimeString()}</span>
                            </div>
                        </div>
                    </div>`;
            }

            msgHistory.innerHTML += newMsg;

            msgHistory.scrollTop = msgHistory.scrollHeight;
        }

        chatSocket.onclose = function (e) {
            console.error('Chat socket closed unexptedly');
        }

        function sendMessage(message) {
            chatSocket.send(JSON.stringify({
                'message': message,
                'user_name': currentUser
            }))
        }

        function handleSend() {
            const message = messageInput.value.trim();

            if (message !== "") {
                chatSocket.send(JSON.stringify({
                    'message': message,
                    'user_name': currentUser
                }));
            }

            messageInput.value = '';
        }

        sendButton.addEventListener('click', function (e) {
            handleSend();
        });

        messageInput.addEventListener('keyup', function (e) {
            if (e.key === 'Enter') {
                handleSend();
            }
        });

    </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
</body>

</html>
